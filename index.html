<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vacation Guides</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: system-ui, -apple-system, sans-serif; background: #F7F8FA; min-height: 100vh; }
button { font-family: inherit; cursor: pointer; }
input, textarea { font-family: inherit; }

.btn-primary { padding: .55rem 1.1rem; background: #2B7A9E; color: #fff; border: none; border-radius: .6rem; font-weight: 600; font-size: .88rem; }
.btn-secondary { padding: .55rem 1.1rem; background: #f0f0f0; color: #333; border: none; border-radius: .6rem; font-weight: 500; font-size: .88rem; }
.btn-danger { padding: .55rem 1.1rem; background: #C0392B; color: #fff; border: none; border-radius: .6rem; font-weight: 600; font-size: .88rem; }
.field { display: block; width: 100%; padding: .6rem .8rem; border: 1.5px solid #e0e0e0; border-radius: .55rem; font-size: .93rem; color: #111; background: #fafafa; outline: none; }
.field:focus { border-color: #2B7A9E; }
label.lbl { display: block; font-size: .78rem; font-weight: 600; color: #555; margin-bottom: .3rem; }

/* Modal */
.modal-bg { position: fixed; inset: 0; background: rgba(0,0,0,.48); z-index: 500; display: flex; align-items: center; justify-content: center; padding: 1rem; overflow-y: auto; }
.modal-box { background: #fff; border-radius: 1.2rem; padding: 1.6rem; width: 100%; max-width: 440px; box-shadow: 0 20px 60px rgba(0,0,0,.2); }
.modal-box.wide { max-width: 540px; }

/* Home */
#home-screen { display: block; }
#dest-screen { display: none; }

.header { background: #fff; border-bottom: 1px solid #eee; padding: .9rem 1.2rem; display: flex; align-items: center; justify-content: space-between; }
.header-title { font-size: 1.25rem; font-weight: 800; color: #111; }
.header-sub { font-size: .75rem; color: #888; margin-top: .1rem; }
.header-actions { display: flex; gap: .4rem; }

.prefs-hint { background: #EDF6FB; border: 1.5px dashed #9BC8DC; border-radius: .85rem; padding: .75rem 1rem; margin-bottom: .9rem; cursor: pointer; }
.prefs-hint-title { font-weight: 600; font-size: .83rem; color: #2B7A9E; }
.prefs-hint-sub { font-size: .75rem; color: #5a9ab5; margin-top: .15rem; }

.dest-list { display: grid; gap: .75rem; padding: 1rem 1.2rem; max-width: 720px; margin: 0 auto; }
.dest-card { display: flex; align-items: center; gap: .9rem; background: #fff; border-radius: 1rem; padding: .9rem 1.1rem; box-shadow: 0 2px 10px rgba(0,0,0,.07); border: 2px solid transparent; cursor: pointer; text-align: left; width: 100%; transition: border-color .15s; }
.dest-card:hover { border-color: var(--accent); }
.dest-icon { width: 2.8rem; height: 2.8rem; border-radius: .75rem; display: flex; align-items: center; justify-content: center; font-size: 1.4rem; flex-shrink: 0; }
.dest-name { font-weight: 700; font-size: .95rem; color: #111; }
.dest-dates { font-size: .77rem; color: #888; margin-top: .1rem; }
.dest-meta { font-size: .72rem; color: #bbb; margin-top: .1rem; }
.dest-arrow { color: #999; font-size: .95rem; flex-shrink: 0; margin-left: auto; }

/* Destination view */
.dest-header { color: #fff; padding: .85rem 1.1rem; display: flex; align-items: center; gap: .8rem; position: sticky; top: 0; z-index: 100; }
.dest-header-back { background: rgba(255,255,255,.2); border: none; color: #fff; border-radius: .45rem; padding: .35rem .7rem; font-size: .83rem; }
.dest-header-title { font-size: 1.05rem; font-weight: 700; flex: 1; }
.dest-header-dates { font-size: .75rem; opacity: .8; }
.menu-btn { background: rgba(255,255,255,.2); border: none; color: #fff; border-radius: .45rem; padding: .35rem .7rem; font-size: .85rem; position: relative; }
.menu-dropdown { position: absolute; right: 0; top: calc(100% + .35rem); background: #fff; border-radius: .7rem; box-shadow: 0 8px 30px rgba(0,0,0,.18); min-width: 185px; overflow: hidden; z-index: 200; max-height: 70vh; overflow-y: auto; display: none; }
.menu-dropdown.open { display: block; }
.menu-section-label { padding: .4rem .75rem; font-size: .65rem; font-weight: 700; color: #888; text-transform: uppercase; letter-spacing: .08em; }
.menu-item { display: flex; align-items: center; gap: .55rem; width: 100%; padding: .5rem .85rem; border: none; background: #fff; cursor: pointer; text-align: left; font-size: .85rem; color: #222; }
.menu-item:hover { background: #f5f5f5; }
.menu-item.active { background: var(--pal-bg); color: var(--accent); font-weight: 600; }
.menu-item.danger { color: #C0392B; }
.menu-divider { height: 1px; background: #eee; margin: .2rem 0; }

.tab-bar { display: flex; overflow-x: auto; gap: .3rem; padding: .5rem .9rem; background: #fff; border-bottom: 1px solid #eee; scrollbar-width: none; }
.tab-bar::-webkit-scrollbar { display: none; }
.tab-btn { flex-shrink: 0; padding: .28rem .65rem; border-radius: 2rem; border: none; background: #f0f0f0; color: #444; font-size: .77rem; white-space: nowrap; }
.tab-btn.active { background: var(--accent); color: #fff; font-weight: 600; }

.dest-content { padding: 1rem 1.1rem; max-width: 680px; margin: 0 auto; }

.card { background: #fff; border-radius: 1rem; padding: 1.1rem; margin-bottom: .7rem; box-shadow: 0 1px 6px rgba(0,0,0,.07); }
.item-row { display: flex; align-items: flex-start; gap: .7rem; }
.item-text { flex: 1; }
.item-name { font-weight: 600; color: #111; font-size: .92rem; }
.item-desc { font-size: .82rem; color: #555; margin-top: .12rem; }
.item-notes { font-size: .78rem; color: #888; font-style: italic; margin-top: .18rem; }
.item-actions { display: flex; gap: .3rem; flex-shrink: 0; }
.icon-btn { background: #f5f5f5; border: none; border-radius: .35rem; padding: .28rem .5rem; font-size: .82rem; color: #555; }
.icon-btn.del { color: #C0392B; }

.empty-state { background: #fff; border-radius: 1rem; padding: 1.8rem; text-align: center; color: #aaa; font-size: .87rem; margin-bottom: .7rem; }
.add-btn { width: 100%; padding: .75rem; border: 2px dashed var(--accent-light); border-radius: 1rem; background: transparent; color: var(--accent); font-size: .87rem; font-weight: 600; }

/* Overview */
.overview-hero { font-size: 2.4rem; margin-bottom: .35rem; }
.overview-title { font-size: 1.5rem; font-weight: 800; margin-bottom: .15rem; }
.overview-dates { font-size: .88rem; color: #666; margin-bottom: .55rem; }
.overview-hint { font-size: .85rem; color: #888; }

/* Edit form */
.edit-form { display: flex; flex-direction: column; gap: .45rem; }
.edit-form-actions { display: flex; gap: .5rem; margin-top: .2rem; }

/* Chips */
.chip-group { display: flex; flex-wrap: wrap; gap: .32rem; margin-top: .35rem; }
.chip { padding: .32rem .72rem; border-radius: 2rem; font-size: .8rem; font-weight: 500; border: 1.5px solid #e0e0e0; background: #f5f5f5; color: #444; cursor: pointer; }
.chip.on { background: #2B7A9E; color: #fff; border-color: #2B7A9E; }

/* Toggle */
.toggle-wrap { display: flex; align-items: center; justify-content: space-between; }
.toggle { width: 40px; height: 22px; border-radius: 11px; border: none; background: #ccc; position: relative; cursor: pointer; transition: background .2s; flex-shrink: 0; padding: 0; }
.toggle.on { background: #2B7A9E; }
.toggle-knob { position: absolute; top: 3px; left: 3px; width: 16px; height: 16px; border-radius: 50%; background: #fff; transition: left .15s; }
.toggle.on .toggle-knob { left: 21px; }

.ai-box { background: #F7F9FC; border: 1.5px solid #dce8f0; border-radius: .8rem; padding: .85rem .95rem; margin-bottom: 1rem; }
.ai-box-title { font-weight: 600; font-size: .86rem; color: #1a3a4a; }
.ai-box-desc { font-size: .78rem; color: #666; margin-top: .3rem; line-height: 1.45; }
</style>
</head>
<body>

<!-- HOME SCREEN -->
<div id="home-screen">
  <div class="header">
    <div>
      <div class="header-title">Vacation Guides</div>
      <div class="header-sub" id="dest-count">0 destinations</div>
    </div>
    <div class="header-actions">
      <button class="btn-secondary" onclick="openPrefs()">Preferences</button>
      <button class="btn-primary" onclick="openNewDest()">+ New</button>
    </div>
  </div>
  <div class="dest-list" id="dest-list">
    <div id="prefs-hint" class="prefs-hint" onclick="openPrefs()" style="display:none">
      <div class="prefs-hint-title">Set travel preferences</div>
      <div class="prefs-hint-sub">Tell Claude about restrictions like no car rental, dietary needs, or budget so new guides are tailored from the start.</div>
    </div>
    <div id="dest-cards"></div>
    <div id="empty-home" style="display:none">
      <div class="card" style="text-align:center;padding:2.5rem 1.5rem">
        <div style="font-size:2.5rem;margin-bottom:.5rem">🗺</div>
        <div style="font-weight:700;font-size:1.05rem;margin-bottom:.4rem">No trips yet</div>
        <div style="color:#888;font-size:.87rem;margin-bottom:1.1rem">Add your first destination to start planning.</div>
        <button class="btn-primary" onclick="openNewDest()">+ Add destination</button>
      </div>
    </div>
  </div>
</div>

<!-- DESTINATION SCREEN -->
<div id="dest-screen">
  <div class="dest-header" id="dest-header">
    <button class="dest-header-back" onclick="goHome()">&#8592; Back</button>
    <div style="flex:1">
      <div class="dest-header-title" id="dest-header-title"></div>
      <div class="dest-header-dates" id="dest-header-dates"></div>
    </div>
    <div style="position:relative">
      <button class="menu-btn" id="menu-btn" onclick="toggleMenu()">Menu &#9660;</button>
      <div class="menu-dropdown" id="menu-dropdown">
        <div class="menu-section-label">Sections</div>
        <div id="menu-items"></div>
        <div class="menu-divider"></div>
        <button class="menu-item danger" onclick="confirmDeleteDest()">Delete destination</button>
      </div>
    </div>
  </div>
  <div class="tab-bar" id="tab-bar"></div>
  <div class="dest-content" id="dest-content"></div>
</div>

<!-- MODALS -->
<div id="modal-container"></div>

  transport:[
    {id:"no_car",label:"No car rental"},

    {id:"taxi_ok",label:"Taxis/rideshare OK"},
  ],
  accommodation:[
    {id:"hotel",label:"Hotels"},

    {id:"central",label:"Must be central"},
  ],
  dietary:[
    {id:"vegetarian",label:"Vegetarian"},
    {id:"vegan",label:"Vegan"},
    {id:"gluten_free",label:"Gluten-free"},
    {id:"halal",label:"Halal"},
    {id:"kosher",label:"Kosher"},
    {id:"no_seafood",label:"No seafood"},
    {id:"allergies",label:"Severe allergies"},
  ],
};

// ── State ─────────────────────────────────────────────────────────────
var destinations = [];
var prefs = {transport:[],accommodation:[],dietary:[],budget:"",groupType:"",mobility:"",freetext:""};
var activeDestId = null;
var activeSectionId = null;

// ── Storage ───────────────────────────────────────────────────────────
async function loadAll() {
  try {
    var dr = await window.storage.get("vg_destinations");
    var dests = dr ? JSON.parse(dr.value) : [];
    if (!dests.some(function(d){return d.id==="dest_annecy_2026";})) {
      dests = [ANNECY].concat(dests);
    }
    destinations = dests;
  } catch(e) { destinations = [ANNECY]; }
  try {
    var pr = await window.storage.get("vg_prefs");
    if (pr) prefs = JSON.parse(pr.value);
  } catch(e) {}
}
async function saveDests() {
  try { await window.storage.set("vg_destinations", JSON.stringify(destinations)); } catch(e) {}
}
async function savePrefs() {
  try { await window.storage.set("vg_prefs", JSON.stringify(prefs)); } catch(e) {}
}

// ── Render home ───────────────────────────────────────────────────────
function renderHome() {
  document.getElementById("home-screen").style.display = "block";
  document.getElementById("dest-screen").style.display = "none";

  var hasPrefs = (prefs.transport.length || prefs.dietary.length || prefs.budget || prefs.groupType || prefs.freetext);
  document.getElementById("prefs-hint").style.display = hasPrefs ? "none" : "block";
  document.getElementById("dest-count").textContent = destinations.length + " destination" + (destinations.length !== 1 ? "s" : "");
  document.getElementById("empty-home").style.display = destinations.length === 0 ? "block" : "none";

  var container = document.getElementById("dest-cards");
  container.innerHTML = "";
  destinations.forEach(function(dest, i) {
    var pal = PALETTES[i % PALETTES.length];
    var btn = document.createElement("button");
    btn.className = "dest-card";
    btn.style.setProperty("--accent", pal.accent);
    btn.innerHTML =
      '<div class="dest-icon" style="background:' + pal.bg + '">' + dest.emoji + '</div>' +
      '<div style="flex:1">' +
        '<div class="dest-name">' + esc(dest.name) + '</div>' +
        (dest.dates ? '<div class="dest-dates">' + esc(dest.dates) + '</div>' : '') +
        '<div class="dest-meta">' + dest.sections.length + ' sections</div>' +
      '</div>' +
      '<div class="dest-arrow" style="color:' + pal.accent + '">&#8250;</div>';
    btn.onclick = function() { openDest(dest.id); };
    container.appendChild(btn);
  });
}

// ── Open destination ──────────────────────────────────────────────────
function openDest(id) {
  activeDestId = id;
  activeSectionId = null;
  var dest = getDest();
  var idx = destinations.findIndex(function(d){return d.id===id;});
  var pal = PALETTES[idx % PALETTES.length];

  document.getElementById("home-screen").style.display = "none";
  document.getElementById("dest-screen").style.display = "block";

  var hdr = document.getElementById("dest-header");
  hdr.style.background = pal.accent;
  document.getElementById("dest-header-title").textContent = dest.emoji + " " + dest.name;
  var datesEl = document.getElementById("dest-header-dates");
  datesEl.textContent = dest.dates || "";
  datesEl.style.display = dest.dates ? "block" : "none";

  // CSS vars for this dest
  document.documentElement.style.setProperty("--accent", pal.accent);
  document.documentElement.style.setProperty("--accent-light", pal.accent + "55");
  document.documentElement.style.setProperty("--pal-bg", pal.bg);
  document.getElementById("dest-screen").style.background = pal.bg;

  renderMenu();
  renderTabs();
  renderSection();
}

function goHome() {
  activeDestId = null;
  activeSectionId = null;
  renderHome();
}

function getDest() {
  return destinations.find(function(d){return d.id===activeDestId;});
}

function updateDest(updated) {
  destinations = destinations.map(function(d){return d.id===updated.id?updated:d;});
  saveDests();
}

// ── Menu ──────────────────────────────────────────────────────────────
function toggleMenu() {
  var dd = document.getElementById("menu-dropdown");
  dd.classList.toggle("open");
}
document.addEventListener("click", function(e) {
  var mb = document.getElementById("menu-btn");
  var dd = document.getElementById("menu-dropdown");
  if (mb && dd && !mb.contains(e.target) && !dd.contains(e.target)) {
    dd.classList.remove("open");
  }
});

function renderMenu() {
  var dest = getDest();
  var container = document.getElementById("menu-items");
  container.innerHTML = "";

  // Overview
  var ov = document.createElement("button");
  ov.className = "menu-item" + (activeSectionId === null ? " active" : "");
  ov.textContent = "Overview";
  ov.onclick = function() { activeSectionId = null; renderTabs(); renderSection(); toggleMenu(); };
  container.appendChild(ov);

  dest.sections.forEach(function(s) {
    var btn = document.createElement("button");
    btn.className = "menu-item" + (activeSectionId === s.id ? " active" : "");
    var icon = SECTION_ICONS[s.id] || "📌";
    btn.innerHTML = '<span>' + icon + '</span> ' + esc(s.label);
    btn.onclick = function() { activeSectionId = s.id; renderTabs(); renderSection(); toggleMenu(); };
    container.appendChild(btn);
  });
}

// ── Tabs ──────────────────────────────────────────────────────────────
function renderTabs() {
  var dest = getDest();
  var bar = document.getElementById("tab-bar");
  bar.innerHTML = "";

  var ov = document.createElement("button");
  ov.className = "tab-btn" + (activeSectionId === null ? " active" : "");
  ov.textContent = "Home";
  ov.onclick = function() { activeSectionId = null; renderMenu(); renderSection(); };
  bar.appendChild(ov);

  dest.sections.forEach(function(s) {
    var btn = document.createElement("button");
    btn.className = "tab-btn" + (activeSectionId === s.id ? " active" : "");
    var icon = SECTION_ICONS[s.id] || "📌";
    btn.innerHTML = icon + " " + esc(s.label);
    btn.onclick = function() { activeSectionId = s.id; renderMenu(); renderSection(); };
    bar.appendChild(btn);
  });
}

// ── Section content ───────────────────────────────────────────────────
function renderSection() {
  var dest = getDest();
  var container = document.getElementById("dest-content");
  container.innerHTML = "";

  if (activeSectionId === null) {
    renderOverview(dest, container);
    return;
  }
  var section = dest.sections.find(function(s){return s.id===activeSectionId;});
  if (!section) return;
  renderSectionItems(dest, section, container);
}

function renderOverview(dest, container) {
  var notesId = "notes_" + dest.id;
  container.innerHTML =
    '<div class="card">' +
      '<div class="overview-hero">' + dest.emoji + '</div>' +
      '<div class="overview-title" style="color:var(--accent)">' + esc(dest.name) + '</div>' +
      (dest.dates ? '<div class="overview-dates">' + esc(dest.dates) + '</div>' : '') +
      '<div class="overview-hint">Select a section from the tabs above or the Menu button.</div>' +
    '</div>' +
    '<div class="card">' +
      '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:.6rem">' +
        '<div style="font-weight:700;font-size:.93rem">Trip notes</div>' +
        '<button class="btn-secondary" style="padding:.25rem .6rem;font-size:.76rem" onclick="editNotes()">Edit</button>' +
      '</div>' +
      '<p id="notes-display" style="font-size:.87rem;color:' + (dest.notes ? '#333' : '#bbb') + ';white-space:pre-wrap">' +
        (dest.notes ? esc(dest.notes) : 'No notes yet.') + '</p>' +
    '</div>';
}

function editNotes() {
  var dest = getDest();
  showModal(
    '<h2 style="margin:0 0 1rem;font-size:1.05rem;font-weight:800">Trip notes</h2>' +
    '<textarea id="modal-notes" class="field" rows="6" style="resize:vertical;margin-bottom:1rem" placeholder="Add any notes...">' + esc(dest.notes||'') + '</textarea>' +
    '<div style="display:flex;gap:.6rem">' +
      '<button class="btn-secondary" style="flex:1" onclick="closeModal()">Cancel</button>' +
      '<button class="btn-primary" style="flex:2" onclick="saveNotes()">Save</button>' +
    '</div>'
  );
}
function saveNotes() {
  var dest = getDest();
  var v = document.getElementById("modal-notes").value;
  updateDest(Object.assign({}, dest, {notes: v}));
  closeModal();
  renderSection();
}

function renderSectionItems(dest, section, container) {
  var items = (dest.sectionData && dest.sectionData[section.id]) ? dest.sectionData[section.id] : [];
  var icon = SECTION_ICONS[section.id] || "📌";

  var html = '<div style="display:flex;align-items:center;gap:.65rem;margin-bottom:1rem">' +
    '<span style="font-size:1.5rem">' + icon + '</span>' +
    '<h2 style="font-size:1.1rem;font-weight:800;color:var(--accent)">' + esc(section.label) + '</h2>' +
    '</div>';

  if (items.length === 0) {
    html += '<div class="empty-state">No items yet. Add one below.</div>';
  } else {
    items.forEach(function(item, idx) {
      html +=
        '<div class="card" id="item-card-' + esc(item.id) + '">' +
          '<div class="item-row">' +
            '<div class="item-text">' +
              '<div class="item-name">' + esc(item.name) + '</div>' +
              (item.desc  ? '<div class="item-desc">'  + esc(item.desc)  + '</div>' : '') +
              (item.notes ? '<div class="item-notes">' + esc(item.notes) + '</div>' : '') +
            '</div>' +
            '<div class="item-actions">' +
              '<button class="icon-btn" onclick="editItem(' + JSON.stringify(section.id) + ',' + JSON.stringify(item.id) + ')">&#9998;</button>' +
              '<button class="icon-btn del" onclick="deleteItem(' + JSON.stringify(section.id) + ',' + JSON.stringify(item.id) + ')">&#10005;</button>' +
            '</div>' +
          '</div>' +
        '</div>';
    });
  }

  html += '<button class="add-btn" onclick="addItem(' + JSON.stringify(section.id) + ')">+ Add item</button>';
  container.innerHTML = html;
}

function addItem(sectionId) {
  showModal(
    '<h2 style="margin:0 0 1rem;font-size:1.05rem;font-weight:800">Add item</h2>' +
    '<div class="edit-form">' +
      '<div><label class="lbl">Name *</label><input id="ei-name" class="field" placeholder="Name" autofocus></div>' +
      '<div><label class="lbl">Short description</label><input id="ei-desc" class="field" placeholder="Description"></div>' +
      '<div><label class="lbl">Notes</label><textarea id="ei-notes" class="field" rows="2" placeholder="Notes (optional)" style="resize:vertical"></textarea></div>' +
    '</div>' +
    '<div class="edit-form-actions">' +
      '<button class="btn-secondary" style="flex:1" onclick="closeModal()">Cancel</button>' +
      '<button class="btn-primary" style="flex:2" onclick="saveNewItem(' + JSON.stringify(sectionId) + ')">Add</button>' +
    '</div>'
  );
  setTimeout(function(){var el=document.getElementById("ei-name");if(el)el.focus();},50);
}

function saveNewItem(sectionId) {
  var name = (document.getElementById("ei-name").value || "").trim();
  if (!name) { alert("Name is required."); return; }
  var dest = getDest();
  var sd = Object.assign({}, dest.sectionData || {});
  sd[sectionId] = (sd[sectionId] || []).concat([{
    id: "item_" + Date.now(),
    name: name,
    desc: document.getElementById("ei-desc").value || "",
    notes: document.getElementById("ei-notes").value || ""
  }]);
  updateDest(Object.assign({}, dest, {sectionData: sd}));
  closeModal();
  renderSection();
}

function editItem(sectionId, itemId) {
  var dest = getDest();
  var items = (dest.sectionData && dest.sectionData[sectionId]) || [];
  var item = items.find(function(i){return i.id===itemId;});
  if (!item) return;
  showModal(
    '<h2 style="margin:0 0 1rem;font-size:1.05rem;font-weight:800">Edit item</h2>' +
    '<div class="edit-form">' +
      '<div><label class="lbl">Name *</label><input id="ei-name" class="field" value="' + esc(item.name) + '" autofocus></div>' +
      '<div><label class="lbl">Short description</label><input id="ei-desc" class="field" value="' + esc(item.desc||'') + '"></div>' +
      '<div><label class="lbl">Notes</label><textarea id="ei-notes" class="field" rows="2" style="resize:vertical">' + esc(item.notes||'') + '</textarea></div>' +
    '</div>' +
    '<div class="edit-form-actions">' +
      '<button class="btn-secondary" style="flex:1" onclick="closeModal()">Cancel</button>' +
      '<button class="btn-primary" style="flex:2" onclick="saveEditItem(' + JSON.stringify(sectionId) + ',' + JSON.stringify(itemId) + ')">Save</button>' +
    '</div>'
  );
  setTimeout(function(){var el=document.getElementById("ei-name");if(el)el.focus();},50);
}

function saveEditItem(sectionId, itemId) {
  var name = (document.getElementById("ei-name").value || "").trim();
  if (!name) { alert("Name is required."); return; }
  var dest = getDest();
  var sd = Object.assign({}, dest.sectionData || {});
  sd[sectionId] = (sd[sectionId] || []).map(function(i) {
    return i.id === itemId ? Object.assign({}, i, {
      name: name,
      desc: document.getElementById("ei-desc").value || "",
      notes: document.getElementById("ei-notes").value || ""
    }) : i;
  });
  updateDest(Object.assign({}, dest, {sectionData: sd}));
  closeModal();
  renderSection();
}

function deleteItem(sectionId, itemId) {
  var dest = getDest();
  var sd = Object.assign({}, dest.sectionData || {});
  sd[sectionId] = (sd[sectionId] || []).filter(function(i){return i.id!==itemId;});
  updateDest(Object.assign({}, dest, {sectionData: sd}));
  renderSection();
}

// ── Delete destination ────────────────────────────────────────────────
function confirmDeleteDest() {
  toggleMenu();
  var dest = getDest();
  showModal(
    '<h2 style="margin:0 0 .6rem;font-size:1.05rem">Delete ' + esc(dest.name) + '?</h2>' +
    '<p style="margin:0 0 1.2rem;color:#666;font-size:.87rem">This cannot be undone.</p>' +
    '<div style="display:flex;gap:.6rem">' +
      '<button class="btn-secondary" style="flex:1" onclick="closeModal()">Cancel</button>' +
      '<button class="btn-danger" style="flex:1" onclick="deleteDest()">Delete</button>' +
    '</div>'
  );
}
function deleteDest() {
  destinations = destinations.filter(function(d){return d.id!==activeDestId;});
  saveDests();
  closeModal();
  goHome();
}

// ── New destination ───────────────────────────────────────────────────
var EMOJIS = ["✈️","🌍","🏝","🗺","🎒","🏔","🌅","🛳","🌴","🏜","🌋","🗽","⛩","🏯","🎪","🏙","🌃","🗼","🎭","🏕"];
var selectedEmoji = 0;
var aiEnabled = true;

function openNewDest() {
  selectedEmoji = 0;
  aiEnabled = true;
  var emojiGrid = EMOJIS.map(function(e, i) {
    return '<button onclick="selectEmoji(' + i + ')" id="emoji-opt-' + i + '" style="font-size:1.3rem;padding:.28rem .38rem;border:2px solid ' + (i===0?'#2B7A9E':'transparent') + ';border-radius:.45rem;background:' + (i===0?'#E8F4F8':'#f5f5f5') + ';cursor:pointer">' + e + '</button>';
  }).join("");

  showModal(
    '<h2 style="margin:0 0 1rem;font-size:1.1rem;font-weight:800">Add a destination</h2>' +
    '<div style="margin-bottom:.85rem">' +
      '<label class="lbl">Icon</label>' +
      '<div style="display:flex;flex-wrap:wrap;gap:.28rem;margin-top:.3rem">' + emojiGrid + '</div>' +
    '</div>' +
    '<div style="margin-bottom:.85rem"><label class="lbl">Destination name *</label>' +
      '<input id="nd-name" class="field" placeholder="e.g. Lisbon, Portugal" autofocus></div>' +
    '<div style="margin-bottom:1rem"><label class="lbl">Trip dates (optional)</label>' +
      '<input id="nd-dates" class="field" placeholder="e.g. Aug 3-10, 2026"></div>' +
    '<div class="ai-box" style="margin-bottom:1rem">' +
      '<div class="toggle-wrap">' +
        '<div class="ai-box-title">Generate guide with AI</div>' +
        '<button class="toggle on" id="ai-toggle" onclick="toggleAI()"><span class="toggle-knob"></span></button>' +
      '</div>' +
      '<div class="ai-box-desc" id="ai-box-desc">Claude will scaffold sections and suggestions for this destination.</div>' +
    '</div>' +
    '<div id="nd-error" style="color:#C05C1A;font-size:.81rem;margin-bottom:.6rem;display:none"></div>' +
    '<div style="display:flex;gap:.6rem">' +
      '<button class="btn-secondary" style="flex:1" onclick="closeModal()">Cancel</button>' +
      '<button class="btn-primary" style="flex:2" id="nd-create-btn" onclick="createDest()">Create with AI</button>' +
    '</div>',
    true
  );
  setTimeout(function(){var el=document.getElementById("nd-name");if(el)el.focus();},50);
}

function selectEmoji(i) {
  EMOJIS.forEach(function(_, j) {
    var btn = document.getElementById("emoji-opt-" + j);
    if (!btn) return;
    btn.style.borderColor = j === i ? "#2B7A9E" : "transparent";
    btn.style.background  = j === i ? "#E8F4F8"  : "#f5f5f5";
  });
  selectedEmoji = i;
}

function toggleAI() {
  aiEnabled = !aiEnabled;
  var tog = document.getElementById("ai-toggle");
  var desc = document.getElementById("ai-box-desc");
  var btn  = document.getElementById("nd-create-btn");
  if (tog) { tog.className = "toggle" + (aiEnabled ? " on" : ""); }
  if (desc) { desc.textContent = aiEnabled ? "Claude will scaffold sections and suggestions for this destination." : "A blank guide with default sections will be created."; }
  if (btn)  { btn.textContent  = aiEnabled ? "Create with AI" : "Create blank guide"; }
}

async function createDest() {
  var name = (document.getElementById("nd-name").value || "").trim();
  if (!name) { alert("Please enter a destination name."); return; }
  var dates   = document.getElementById("nd-dates").value || "";
  var emoji   = EMOJIS[selectedEmoji];
  var errEl   = document.getElementById("nd-error");
  var createBtn = document.getElementById("nd-create-btn");

  if (!aiEnabled) {
    addDestination(name, dates, emoji, null);
    closeModal();
    return;
  }

  createBtn.disabled = true;
  createBtn.textContent = "Generating...";
  if (errEl) errEl.style.display = "none";

  var sysPrompt = "You are a travel guide generator. Respond ONLY with valid JSON, no markdown fences. Shape: {\"notes\":\"string\",\"sections\":[{\"id\":\"string\",\"label\":\"string\",\"type\":\"static\"}],\"sectionData\":{\"sectionId\":[{\"id\":\"string\",\"name\":\"string\",\"desc\":\"string\",\"notes\":\"string\"}]}}. Include 8-12 sections, always include days (type:dynamic), tips, pack (type:dynamic). 3-6 items per section. Be specific with real place names.";

  var prefLines = [];
  if (prefs.transport.length)     prefLines.push("Transport restrictions: " + prefs.transport.join(", "));
  if (prefs.accommodation.length) prefLines.push("Accommodation: " + prefs.accommodation.join(", "));
  if (prefs.dietary.length)       prefLines.push("Dietary: " + prefs.dietary.join(", "));
  if (prefs.budget)    prefLines.push("Budget: " + prefs.budget);
  if (prefs.groupType) prefLines.push("Group: " + prefs.groupType);
  if (prefs.mobility)  prefLines.push("Mobility: " + prefs.mobility);
  if (prefs.freetext)  prefLines.push("Notes: " + prefs.freetext);
  if (prefLines.length) sysPrompt += " USER PREFERENCES (respect strictly): " + prefLines.join("; ");

  try {
    var resp = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: {"Content-Type":"application/json"},
      body: JSON.stringify({
        model: "claude-sonnet-4-6", max_tokens: 1000,
        system: sysPrompt,
        messages: [{role:"user", content:"Generate a vacation guide scaffold for: " + name + (dates ? " (" + dates + ")" : "")}]
      })
    });
    var data = await resp.json();
    var raw = "";
    (data.content||[]).forEach(function(b){if(b.type==="text")raw+=b.text;});
    raw = raw.replace(/```json|```/g,"").trim();
    var scaffold = JSON.parse(raw);
    addDestination(name, dates, emoji, scaffold);
    closeModal();
  } catch(e) {
    if (errEl) { errEl.textContent = "Could not generate AI scaffold. Creating blank guide."; errEl.style.display = "block"; }
    addDestination(name, dates, emoji, null);
    closeModal();
  }
}

function addDestination(name, dates, emoji, scaffold) {
  var dest = {
    id: "dest_" + Date.now(),
    name: name, dates: dates, emoji: emoji,
    notes: scaffold ? (scaffold.notes || "") : "",
    sections: scaffold ? scaffold.sections : DEFAULT_SECTIONS.map(function(s){return Object.assign({},s);}),
    sectionData: scaffold ? (scaffold.sectionData || {}) : {}
  };
  destinations = destinations.concat([dest]);
  saveDests();
  openDest(dest.id);
}

// ── Preferences ───────────────────────────────────────────────────────
function openPrefs() {
  function chipRow(category, label) {
    var chips = PREF_OPTIONS[category].map(function(opt) {
      var on = prefs[category].indexOf(opt.id) !== -1;
      return '<button class="chip' + (on?' on':'') + '" id="chip-' + category + '-' + opt.id + '" onclick="toggleChip(' + JSON.stringify(category) + ',' + JSON.stringify(opt.id) + ')">' + esc(opt.label) + '</button>';
    }).join("");
    return '<div style="margin-bottom:.85rem"><div style="font-size:.72rem;font-weight:700;color:#888;text-transform:uppercase;letter-spacing:.07em;margin-bottom:.3rem">' + label + '</div><div class="chip-group">' + chips + '</div></div>';
  }
  function singleRow(key, label, opts) {
    var btns = opts.map(function(o) {
      var on = prefs[key] === o;
      return '<button class="chip' + (on?' on':'') + '" id="chip-' + key + '-' + o.replace(/[^a-z]/gi,'_') + '" onclick="toggleSingle(' + JSON.stringify(key) + ',' + JSON.stringify(o) + ')">' + esc(o) + '</button>';
    }).join("");
    return '<div style="margin-bottom:.85rem"><div style="font-size:.72rem;font-weight:700;color:#888;text-transform:uppercase;letter-spacing:.07em;margin-bottom:.3rem">' + label + '</div><div class="chip-group">' + btns + '</div></div>';
  }

  showModal(
    '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:.85rem">' +
      '<h2 style="margin:0;font-size:1.05rem;font-weight:800">Travel Preferences</h2>' +
      '<button onclick="closeModal()" style="background:none;border:none;font-size:1.3rem;cursor:pointer;color:#999">&#10005;</button>' +
    '</div>' +
    '<p style="margin:0 0 1rem;font-size:.81rem;color:#666;line-height:1.5">These are passed to Claude when generating guide scaffolds for new destinations.</p>' +
    chipRow("transport","Transport") +
    chipRow("accommodation","Accommodation") +
    chipRow("dietary","Dietary") +
    singleRow("budget","Budget level",["Budget","Mid-range","Luxury"]) +
    singleRow("groupType","Travelling as",["Solo","Couple","Family","Friends","Seniors"]) +
    singleRow("mobility","Mobility",["No restrictions","Limited walking","Wheelchair","No stairs"]) +
    '<div style="margin-bottom:1.2rem"><label class="lbl">Anything else Claude should know</label>' +
      '<textarea id="pref-freetext" class="field" rows="3" placeholder="e.g. We travel with a baby. We avoid tourist traps." style="resize:vertical;margin-top:.3rem">' + esc(prefs.freetext||'') + '</textarea></div>' +
    '<div style="display:flex;gap:.6rem">' +
      '<button class="btn-secondary" style="flex:1" onclick="closeModal()">Cancel</button>' +
      '<button class="btn-primary" style="flex:2" onclick="savePrefsFromModal()">Save preferences</button>' +
    '</div>',
    true
  );
}

function toggleChip(category, id) {
  var idx = prefs[category].indexOf(id);
  if (idx === -1) prefs[category] = prefs[category].concat([id]);
  else prefs[category] = prefs[category].filter(function(x){return x!==id;});
  var btn = document.getElementById("chip-" + category + "-" + id);
  if (btn) btn.className = "chip" + (prefs[category].indexOf(id) !== -1 ? " on" : "");
}
function toggleSingle(key, val) {
  var old = prefs[key];
  prefs[key] = old === val ? "" : val;
  // update all chips for this key
  var opts = key==="budget" ? ["Budget","Mid-range","Luxury"] :
             key==="groupType" ? ["Solo","Couple","Family","Friends","Seniors"] :
             ["No restrictions","Limited walking","Wheelchair","No stairs"];
  opts.forEach(function(o) {
    var btn = document.getElementById("chip-" + key + "-" + o.replace(/[^a-z]/gi,'_'));
    if (btn) btn.className = "chip" + (prefs[key]===o?" on":"");
  });
}
function savePrefsFromModal() {
  prefs.freetext = document.getElementById("pref-freetext").value || "";
  savePrefs();
  closeModal();
  renderHome();
}

// ── Modal helpers ─────────────────────────────────────────────────────
function showModal(html, wide) {
  var c = document.getElementById("modal-container");
  c.innerHTML =
    '<div class="modal-bg" onclick="modalBgClick(event)">' +
      '<div class="modal-box' + (wide?' wide':'') + '">' + html + '</div>' +
    '</div>';
}
function modalBgClick(e) {
  if (e.target.classList.contains("modal-bg")) closeModal();
}
function closeModal() {
  document.getElementById("modal-container").innerHTML = "";
}

// ── Escape ────────────────────────────────────────────────────────────
function esc(s) {
  if (!s) return "";
  return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;").replace(/'/g,"&#39;");
}

// ── Init ──────────────────────────────────────────────────────────────
loadAll().then(function() { renderHome(); });
</script>
